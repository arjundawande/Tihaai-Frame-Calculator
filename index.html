<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="canonical" href="https://arjundawande.github.io/Tihaai-Frame-Calculator/">
  <link rel="icon" type="image/ico" href="Icons/IMG_20250830_150728.ico">
  <link rel="apple-touch-icon" type="image/png" href="Icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" href="Icons/android-chrome-512x512.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <title>Tihaai Frame Calculator</title>
  <style>
    body{margin:5%;}
  </style>
</head>
<body>
  <!-- Header -->
  <header> 
    <div class="d-inline">
      <h1 class="text-center" id="title">Tihaai Frame Calculator</h1>
    </div>
  </header>
  <br>
  <!-- Main Body -->
  <div class="container-fluid card bg-white text-center col shadow-lg border-0" style="padding:2%;">
    <div class="row card-body">
      <div class="col">
        <!-- Calculator Form -->
        <form class="card-text" id="form">
          <label for="input" class="card-title"><b>Enter Total Number of Matras:</b></label>
          <br>
          <input type="number" required placeholder="Enter a value from 1-16" id="input" class="bg-transparent text-center form-control" style="border:none; border-bottom:3px solid black;">
          <br><br>
          <label for="option" class="card-title"><b>Select the Type of Tihaai:</b></label>
          <br>
          <!-- Select Tihaai Type -->
          <select id="option" class="bg-transparent text-center form-select" style="border:none; border-bottom:3px solid black;">
            <option class="text-center" selected>Normal Tihaai</option>
            <option class="text-center">Chakradhar Tihaai</option>
          </select>
          <br>
          <input type="submit" value="Calculate" class="btn btn-primary">
        </form>
        <hr>
        <!-- Output -->
        <div class="container">
          <h6>Number of Matras in <b>One Frame</b> of the Tihaai is:</h6>
          <br>
          <p class="text-primary"><b id="ans"></b></p>
          <p style="display:none;" class="text-danger alert alert-danger" id="error">Error!</p>
          <p id="chakradharNote"></p>
          <h6 class="fs-6 text-muted alert alert-secondary" style="display:none;" id="note"></h6>
        </div>
      </div>
    </div>
  </div><br>
  <!-- Copyright Banner/Footer -->
  <footer class="container-fluid text-center">
    <p>&copy; 2025-2026 Arjun Dawande. All Rights Reserved.</p>
  </footer>
  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  <script src="./scripts/script.js"></script>
</body>
</html>
